esphome:
  name: ntpserver
  friendly_name: NTPserver
  project:
    name: "mcrespov.ntp_server"
    version: "0.2"
  includes:
    - ntp_server.h
  on_boot:
    priority: -100
    then:
      - lambda: |-
          ntp_server_setup();

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf
    version: recommended

logger: 
  level: INFO # temporal, DEBUG

api:
  encryption:
    key: !secret api_encryption_key_ntpserver

ota:
  - platform: esphome
    password: !secret ota_password_ntpserver

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Ntpserver Fallback Hotspot"
    password: !secret fallback_ap_password

captive_portal: {}

web_server:
  port: 80
  version: 3

uart:
  - id: gps_uart
    rx_pin: 6
    tx_pin: 7
    baud_rate: 9600

time:
  - platform: gps
    id: gps_time
  - platform: homeassistant
    id: ha_time

gps:
  id: mi_gps
  uart_id: gps_uart
  satellites:
    name: "Satélites Conectados"
    id: satelites_gps
    icon: "mdi:satellite-variant"
#  altitude:
#    name: "Altitud GPS"
#    accuracy_decimals: 1

sensor:
  - platform: wifi_signal
    name: "Señal WiFi NTP"
  - platform: internal_temperature
    name: "Temperatura Interna C6"
  
  - platform: template
    name: "Desviación GPS vs HA"
    unit_of_measurement: "s"
    accuracy_decimals: 3
    lambda: |-
      if (id(gps_time).now().is_valid() && id(ha_time).now().is_valid()) {
        return (float)(id(gps_time).now().timestamp - id(ha_time).now().timestamp);
      }
      return {};

interval:
  - interval: 20ms
    then:
      - lambda: |-
          ntp_server_loop();
  - interval: 5s
    then:
      - lambda: |-
          auto t_gps = id(gps_time).now();
          auto t_ha = id(ha_time).now();
          if (t_gps.is_valid() && t_ha.is_valid()) {
            double diff = t_gps.timestamp - t_ha.timestamp;
            ESP_LOGI("reloj_info", "SATÉLITE: %s | HA: %s | DESVIACIÓN: %.3f s", 
                     t_gps.strftime("%H:%M:%S").c_str(), 
                     t_ha.strftime("%H:%M:%S").c_str(), 
                     diff);
          }

binary_sensor:
  - platform: template
    name: "GPS con Señal (Fix)"
    lambda: |-
      if (id(satelites_gps).has_state()) {
        return id(satelites_gps).state >= 4;
      }
      return false;
    icon: "mdi:crosshairs-gps"

button:
  - platform: restart
    name: "Reiniciar NTP Server"
    icon: "mdi:restart"